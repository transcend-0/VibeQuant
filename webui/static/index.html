<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VibeQuant</title>
<style>
:root {
  --surface-0: #f4f4f2; --surface-1: #fcfcfb;
  --text-primary: #0b0b0b; --text-secondary: #52514e; --text-muted: #8a8984;
  --border: #e3e2dd; --series-1: #2a78d6; --series-2: #1baf7a; --series-ls: #e34948;
  --good: #008300; --serious: #c0392b; --warn-bg: #fdf6e3;
  --accent: #2a78d6; --accent-ink: #ffffff;
  --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}
@media (prefers-color-scheme: dark) {
  :root {
    --surface-0: #111110; --surface-1: #1a1a19;
    --text-primary: #ffffff; --text-secondary: #c3c2b7; --text-muted: #85847c;
    --border: #33332f; --series-1: #3987e5; --series-2: #199e70; --series-ls: #e66767;
    --good: #35a835; --serious: #e66767; --warn-bg: #2a2618;
    --accent: #3987e5; --accent-ink: #ffffff;
  }
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--surface-0); color: var(--text-primary);
  font: 15px/1.55 -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
header { display: flex; align-items: center; gap: 12px; padding: 12px 22px;
  background: var(--surface-1); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 5; flex-wrap: wrap; }
header h1 { font-size: 18px; margin: 0; }
header .spacer { flex: 1; }
.modes { display: flex; gap: 4px; background: var(--surface-0);
  border: 1px solid var(--border); border-radius: 10px; padding: 3px; flex-wrap: wrap; }
.modes button { border: none; background: transparent; border-radius: 7px;
  padding: 6px 14px; font-weight: 600; color: var(--text-secondary); }
.modes button.active { background: var(--accent); color: var(--accent-ink); }
button { font: inherit; border: 1px solid var(--border); background: var(--surface-1);
  color: var(--text-primary); border-radius: 8px; padding: 7px 14px; cursor: pointer; }
button:hover { border-color: var(--accent); }
button.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
button.danger:hover { border-color: var(--serious); color: var(--serious); }
button:disabled { opacity: .5; cursor: wait; }
button.back { font-weight: 600; }
main { padding: 18px 22px; max-width: 1560px; margin: 0 auto; }
.cols { display: grid; grid-template-columns: minmax(380px, 480px) 1fr; gap: 18px; }
@media (max-width: 1020px) { .cols { grid-template-columns: 1fr; } }
.card { background: var(--surface-1); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 18px; margin-bottom: 18px; }
.card h2 { font-size: 13.5px; margin: 0 0 10px; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: .6px; }
textarea, input, select {
  width: 100%; font: inherit; color: var(--text-primary);
  background: var(--surface-0); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 10px; }
textarea { resize: vertical; }
textarea.code { font-family: var(--mono); font-size: 13px; white-space: pre; }
#sourceInput { min-height: 64px; }
#factorExprs { min-height: 88px; font-family: var(--mono); font-size: 13px; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 2px; }
.chips button { font-size: 12.5px; padding: 4px 10px; border-radius: 999px;
  color: var(--text-secondary); }
.chips button.sel { border-color: var(--accent); color: var(--accent); }
.row { display: flex; gap: 8px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 8px; }
label.small { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 2px; }
.note { background: var(--warn-bg); border-radius: 8px; padding: 8px 12px;
  font-size: 13px; margin: 6px 0; color: var(--text-secondary); }
ol.plan { margin: 4px 0 0; padding-left: 20px; color: var(--text-secondary); font-size: 13.5px; }
.tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(125px, 1fr)); gap: 10px; }
.tile { background: var(--surface-0); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 12px; }
.tile .v { font-size: 20px; font-weight: 650; font-variant-numeric: tabular-nums; }
.tile .l { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.tile .v.pos { color: var(--good); } .tile .v.neg { color: var(--serious); }
.riskline { font-size: 13.5px; margin: 4px 0; }
.riskline.flag { color: var(--serious); } .riskline.warn { color: var(--text-secondary); }
.badge { display: inline-block; font-size: 12px; border-radius: 999px; padding: 2px 10px;
  border: 1px solid var(--border); color: var(--text-secondary); }
.badge.pass { color: var(--good); border-color: var(--good); }
.badge.flag { color: var(--serious); border-color: var(--serious); }
.badge.kind { text-transform: uppercase; letter-spacing: .5px; }
.badge.on { color: var(--good); border-color: var(--good); }
.badge.off { color: var(--text-muted); }
.suggestion { border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px;
  margin: 8px 0; cursor: pointer; }
.suggestion:hover { border-color: var(--accent); }
.suggestion .t { font-weight: 600; }
.suggestion .m { font-size: 12.5px; color: var(--text-muted); margin-top: 2px; }
.chartwrap { position: relative; margin-top: 6px; }
.tooltip { position: absolute; pointer-events: none; display: none;
  background: var(--surface-1); border: 1px solid var(--border); border-radius: 8px;
  padding: 6px 10px; font-size: 12.5px; box-shadow: 0 4px 14px rgba(0,0,0,.12);
  white-space: nowrap; z-index: 3; }
.tooltip .t { color: var(--text-muted); }
svg text { fill: var(--text-muted); font-size: 11px; font-variant-numeric: tabular-nums; }
.legend { display: flex; flex-wrap: wrap; gap: 12px; margin: 6px 2px 0; font-size: 12.5px;
  color: var(--text-secondary); }
.legend .sw, .sw { display: inline-block; width: 10px; height: 10px; border-radius: 3px;
  margin-right: 5px; vertical-align: -1px; }
iframe.reportframe { width: 100%; height: 76vh; border: 1px solid var(--border);
  border-radius: 10px; background: #fff; }
.report { font-size: 14px; }
.report table { border-collapse: collapse; margin: 8px 0; width: 100%; }
.report th, .report td { border: 1px solid var(--border); padding: 5px 9px; text-align: left;
  font-variant-numeric: tabular-nums; font-size: 13px; }
.report th { color: var(--text-secondary); font-weight: 600; background: var(--surface-0); }
.report h1 { font-size: 18px; } .report h2 { font-size: 15px; margin: 14px 0 6px;
  color: var(--text-secondary); }
table.stats, table.list { border-collapse: collapse; width: 100%; font-size: 13px;
  font-variant-numeric: tabular-nums; }
table.stats th, table.stats td, table.list th, table.list td {
  border-bottom: 1px solid var(--border); padding: 6px 8px; text-align: right; }
table.stats th:first-child, table.stats td:first-child,
table.list th:first-child, table.list td:first-child { text-align: left; }
table.list th:nth-child(2), table.list td:nth-child(2) { text-align: left; }
table.stats th, table.list th { color: var(--text-muted); font-weight: 600; }
table.list tr.clickable { cursor: pointer; }
table.list tr.clickable:hover td { background: var(--surface-0); }
.muted { color: var(--text-muted); font-size: 13px; }
.mono { font-family: var(--mono); font-size: 12.5px; }
.err { color: var(--serious); font-size: 13.5px; white-space: pre-wrap; margin-top: 6px; }
.ok { color: var(--good); font-size: 13.5px; }
.spin { display: none; color: var(--text-secondary); font-size: 13.5px; }
footer { text-align: center; color: var(--text-muted); font-size: 12.5px; padding: 8px 0 24px; }
details > summary { cursor: pointer; }
.sig { background: var(--surface-0); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px; font-family: var(--mono); font-size: 12.5px; overflow-x: auto; }
.foldrow { display: flex; white-space: pre; line-height: 1.5; }
.foldmarker { flex: 0 0 14px; color: var(--text-muted); user-select: none; text-align: center; }
.foldmarker.can-fold { cursor: pointer; }
.foldmarker.can-fold:hover { color: var(--accent); }
.foldhint { color: var(--text-muted); font-style: italic; }
.foldview.editable { min-height: 230px; outline: none; cursor: text; }
</style>
</head>
<body>
<header>
  <h1>VibeQuant</h1>
  <nav class="modes">
    <button data-view="strategy" data-i18n="view_strategy"></button>
    <button data-view="factor" data-i18n="view_factor"></button>
    <button data-view="deploy" data-i18n="view_deploy"></button>
    <button data-view="settings">⚙</button>
  </nav>
  <span class="spacer"></span>
  <button id="langBtn"></button>
</header>

<main>

<!-- ==================== RESEARCH (strategy + factor) ==================== -->
<div id="view-research" class="cols">
<section>
  <div class="card">
    <h2 data-i18n="input_title"></h2>
    <textarea id="sourceInput"></textarea>
    <div class="chips" id="examples"></div>
    <div class="row">
      <button class="primary" id="analyzeBtn" data-i18n="analyze_btn"></button>
      <button id="pdfBtn" data-i18n="pdf_btn"></button>
      <input type="file" id="pdfFile" accept=".pdf" style="display:none">
      <span class="badge" id="pdfChip" style="display:none">
        📎 <span id="pdfChipName"></span>
        <a href="#" id="pdfChipRemove" style="margin-left:6px">✕</a>
      </span>
      <span class="spin" id="analyzeSpin" data-i18n="analyzing"></span>
    </div>
    <div class="muted" id="llmHint" style="margin-top:6px"></div>
    <div class="err" id="analyzeError"></div>
  </div>

  <div class="card" id="briefCard" style="display:none">
    <h2 data-i18n="brief_title"></h2>
    <div id="briefHead"></div>
    <div id="briefSuggestions"></div>
  </div>

  <div class="card" id="strategyBuilderCard" style="display:none">
    <h2 data-i18n="sbuilder_title"></h2>
    <div class="grid2">
      <div><label class="small" data-i18n="f_market"></label>
        <select id="stratMarketSelect"></select></div>
      <div><label class="small" data-i18n="s_universe"></label>
        <select id="stratUniverseSelect"></select></div>
      <div style="grid-column: 1 / -1"><label class="small" data-i18n="f_symbols"></label>
        <input type="text" id="stratSymbols"></div>
      <div><label class="small" data-i18n="builder_start"></label>
        <input type="date" id="stratStart" value="2025-01-01"></div>
      <div><label class="small" data-i18n="builder_end"></label>
        <input type="date" id="stratEnd" value="2025-12-31"></div>
      <div><label class="small" data-i18n="s_template"></label>
        <select id="stratTemplate"></select></div>
      <div><label class="small" data-i18n="s_history_depth"></label>
        <input type="number" id="stratHistoryDepth" min="30" value="300"></div>
    </div>
    <div id="stratExprBox" style="margin-top:10px; display:none">
      <label class="small" data-i18n="s_expressions"></label>
      <textarea id="stratExprs" class="mono" style="min-height:60px">Mom20 = Delta(Close, 20) / Delay(Close, 20)</textarea>
    </div>
    <div style="margin-top:10px">
      <label class="small" data-i18n="s_code"></label>
      <textarea class="code" id="stratSource" spellcheck="false" style="min-height:260px"></textarea>
    </div>
    <div class="row">
      <button class="primary" id="stratBuildBtn" data-i18n="build_btn"></button>
      <span class="muted" data-i18n="build_hint"></span>
    </div>
  </div>

  <div class="card" id="builderCard" style="display:none">
    <h2 data-i18n="builder_title"></h2>
    <label class="small" data-i18n="builder_exprs"></label>
    <textarea id="factorExprs">Mom20 = Delta(Close, 20) / Delay(Close, 20)</textarea>
    <details style="margin:6px 0"><summary class="muted" data-i18n="expr_ref"></summary>
      <div class="mono" style="margin-top:6px; line-height:1.8">
        Ts_Mean(x,d) · Ts_Std(x,d) · Ts_Max/Min/Sum(x,d) · Ts_Corr(x,y,d) ·
        Ts_Rank(x,d) · Ts_ArgMax/ArgMin(x,d) · Delay(x,d) · Delta(x,d) ·
        Rank(x) · Scale(x) · Log(x) · Abs(x) · Sign(x) · If(c,a,b)<br>
        <span class="muted" data-i18n="expr_cols"></span>
      </div>
    </details>
    <div class="grid2">
      <div><label class="small" data-i18n="f_market"></label>
        <select id="marketSelect"></select></div>
      <div><label class="small" data-i18n="f_universe"></label>
        <select id="universeSelect"></select></div>
      <div style="grid-column: 1 / -1"><label class="small" data-i18n="f_symbols"></label>
        <input type="text" id="universeInput"></div>
      <div><label class="small" data-i18n="builder_start"></label>
        <input type="date" id="startDate" value="2025-01-01"></div>
      <div><label class="small" data-i18n="builder_end"></label>
        <input type="date" id="endDate" value="2025-12-31"></div>
    </div>
    <div class="grid3">
      <div><label class="small" data-i18n="f_neut"></label>
        <select id="neutSelect">
          <option value="none">none</option>
          <option value="demean">demean (market)</option>
          <option value="industry">industry</option>
          <option value="zscore">zscore</option>
          <option value="rank">rank</option>
        </select></div>
      <div><label class="small" data-i18n="f_decay"></label>
        <input type="number" id="decayInput" value="0" min="0" max="60"></div>
      <div><label class="small" data-i18n="f_trunc"></label>
        <input type="number" id="truncInput" value="0" min="0" max="0.45" step="0.01"></div>
      <div><label class="small" data-i18n="f_maxpos"></label>
        <input type="number" id="maxPosInput" value="0" min="0" max="1" step="0.05"></div>
      <div><label class="small" data-i18n="f_maxtrade"></label>
        <input type="number" id="maxTradeInput" value="0" min="0" max="1" step="0.05"></div>
      <div><label class="small" data-i18n="f_quant"></label>
        <input type="number" id="quantInput" value="4" min="2" max="10"></div>
    </div>
    <div class="row">
      <button class="primary" id="buildBtn" data-i18n="build_btn"></button>
      <span class="muted" data-i18n="build_hint"></span>
    </div>
  </div>

  <div id="planCard" style="display:none; margin-top:14px; padding-top:14px; border-top:1px solid var(--border)">
    <h2 data-i18n="plan_title"></h2>
    <div id="clarifications"></div>
    <ol class="plan" id="planList"></ol>
    <h2 style="margin-top:14px" data-i18n="yaml_title"></h2>
    <div class="sig foldview editable" id="yamlEdit" contenteditable="true" spellcheck="false"></div>
    <div class="row">
      <button class="primary" id="runBtn" data-i18n="run_btn"></button>
      <button id="deployFromTaskBtn" data-i18n="deploy_from_task"></button>
      <span class="spin" id="runSpin" data-i18n="running"></span>
    </div>
    <div class="err" id="runError"></div>
  </div>
</section>

<section>
  <div class="card" id="resultCard" style="display:none">
    <div class="row" style="margin:0 0 10px">
      <button class="back" id="resultBackBtn">← <span data-i18n="back_btn"></span></button>
      <span data-i18n="result_title" style="font-weight:600"></span>
      <span class="muted" id="runIdLabel"></span>
      <span class="badge" id="validBadge" style="display:none"></span>
    </div>
    <div id="validBox" class="muted" style="margin:0 0 10px"></div>
    <div class="row" style="margin-top:8px">
      <input type="text" id="refineInput" style="flex:1; min-width:220px">
      <button id="refineBtn" data-i18n="refine_btn"></button>
      <button id="autoBtn" data-i18n="auto_btn"></button>
      <span class="spin" id="refineSpin" data-i18n="running"></span>
    </div>
    <div id="refineOut"></div>

    <div id="errorResult" style="display:none">
      <div class="err" id="errorMessage" style="white-space:pre-wrap"></div>
      <details style="margin-top:10px" open>
        <summary class="muted" id="errorCodeLabel"></summary>
        <div class="sig" id="errorTaskYaml"></div>
      </details>
    </div>

    <div id="strategyResult" style="display:none">
      <div class="tiles" id="tiles"></div>
      <details style="margin-top:12px">
        <summary class="muted" data-i18n="code_strategy"></summary>
        <div class="sig" id="strategyCode"></div>
      </details>
      <h2 style="margin-top:16px" data-i18n="akq_report_title"></h2>
      <div id="frameBox"></div>
    </div>

    <div id="factorResult" style="display:none">
      <details style="margin-bottom:10px">
        <summary class="muted" data-i18n="code_factor"></summary>
        <div class="sig" id="factorCode"></div>
      </details>
      <div style="overflow-x:auto"><table class="stats" id="factorStats"></table></div>
      <div class="chips" id="factorChips" style="margin-top:10px"></div>
      <h2 style="margin-top:10px" data-i18n="ic_title"></h2>
      <div class="chartwrap" id="icWrap"><div class="tooltip"></div><div class="chartbox"></div></div>
      <h2 style="margin-top:16px" data-i18n="layers_title"></h2>
      <div class="chartwrap" id="layerWrap"><div class="tooltip"></div><div class="chartbox"></div></div>
      <div class="legend" id="layerLegend"></div>
    </div>
  </div>

  <div class="card" id="historyCard">
    <h2 data-i18n="history_title"></h2>
    <div id="historyBox" class="muted"></div>
  </div>
</section>
</div>

<!-- ============================== DEPLOY =============================== -->
<div id="view-deploy" style="display:none">
  <div class="cols">
  <section>
    <div class="card">
      <h2 data-i18n="deploy_new_title"></h2>
      <div class="muted" data-i18n="deploy_explain" style="margin-bottom:8px"></div>
      <label class="small" data-i18n="deploy_yaml"></label>
      <textarea class="code" id="deployYaml" style="min-height:180px" spellcheck="false"></textarea>
      <div class="grid2">
        <div><label class="small" data-i18n="deploy_email"></label>
          <input type="text" id="deployEmail" placeholder="you@example.com"></div>
        <div><label class="small" data-i18n="deploy_time"></label>
          <input type="text" id="deployTime" value="16:30"></div>
      </div>
      <div class="row">
        <button class="primary" id="deployCreateBtn" data-i18n="deploy_create"></button>
        <span class="spin" id="deploySpin" data-i18n="running"></span>
      </div>
      <div class="err" id="deployError"></div>
      <div class="note" data-i18n="deploy_email_note" style="margin-top:10px"></div>
    </div>
  </section>
  <section>
    <div class="card">
      <h2 data-i18n="deploy_list_title"></h2>
      <div id="deployListBox" class="muted"></div>
    </div>
    <div class="card" id="deploySignalsCard" style="display:none">
      <h2 data-i18n="deploy_signals_title"></h2>
      <pre class="sig" id="deploySignals"></pre>
    </div>
  </section>
  </div>
</div>

<!-- ============================= SETTINGS ============================== -->
<div id="view-settings" style="display:none">
  <div class="card" style="max-width:640px">
    <h2 data-i18n="llm_title"></h2>
    <div class="muted" data-i18n="llm_explain" style="margin-bottom:8px"></div>
    <div id="llmStatus" class="muted" style="margin-bottom:8px"></div>
    <label class="small">model</label>
    <input type="text" id="llmModel" placeholder="gpt-5-mini">
    <label class="small" style="margin-top:8px">base_url</label>
    <input type="text" id="llmBaseUrl" placeholder="https://api.openai.com/v1">
    <label class="small" style="margin-top:8px">api_key</label>
    <input type="password" id="llmApiKey" placeholder="sk-...">
    <div class="row">
      <button class="primary" id="llmSaveBtn" data-i18n="llm_save"></button>
      <button id="llmTestBtn" data-i18n="llm_test"></button>
      <span class="spin" id="llmSpin" data-i18n="running"></span>
    </div>
    <div id="llmResult" style="margin-top:8px"></div>
  </div>
  <div class="card" style="max-width:640px">
    <h2 data-i18n="email_title"></h2>
    <div class="muted" data-i18n="email_explain"></div>
  </div>
</div>

</main>

<script>
"use strict";
/* ------------------------------------------------------------ i18n */
const I18N = {
  en: {
    view_strategy: "Strategy Research", view_factor: "Factor Research",
    view_deploy: "Deploy",
    input_title: "1 · Research input — idea, arXiv link, forum URL, or PDF",
    analyze_btn: "Analyze",
    pdf_btn: "Upload PDF…", analyzing: "analyzing…",
    brief_title: "Research brief", suggestions_title: "Suggested tasks",
    builder_title: "Factor workbench",
    builder_exprs: "Factor expressions (one per line, Name = Expr)",
    expr_ref: "expression reference", expr_cols: "columns: Open, High, Low, Close, Volume",
    f_universe: "Universe", f_symbols: "Symbols (comma separated)",
    f_neut: "Neutralization", f_decay: "Decay (days)", f_trunc: "Truncation (per tail)",
    f_forward: "Forward days", f_quant: "Quantiles",
    builder_start: "Start", builder_end: "End",
    build_btn: "Build task", build_hint: "assembles the YAML below",
    plan_title: "2 · Review the plan", yaml_title: "Task DSL (editable)",
    run_btn: "Run", running: "working…",
    deploy_from_task: "Deploy…",
    result_title: "Result",
    akq_report_title: "Strategy report (akquant HTML)",
    ic_title: "IC series (cross-sectional Spearman)",
    layers_title: "Quantile layers · cumulative forward returns",
    history_title: "Results", hist_strategy: "Strategy results",
    hist_factor: "Factor results", no_runs: "No runs yet.",
    col_market: "Market", col_universe: "Universe",

async function withSpin(btnId, spinId, errId, fn) {
  $(btnId).disabled = true;
  const spin = $(spinId);
  const baseLabel = spin.textContent; // e.g. "分析中…" -- some of these can
  spin.style.display = "inline";      // run for minutes on a real PDF, so
  const t0 = Date.now();               // show elapsed time, not just a static spinner
  const tick = () => {
    spin.textContent = `${baseLabel} (${Math.floor((Date.now() - t0) / 1000)}s)`;
  };
  tick();
  const timer = setInterval(tick, 1000);
  if (errId) $(errId).textContent = "";
  try { await fn(); } catch (e) { if (errId) $(errId).textContent = e.message; }
  finally {
    clearInterval(timer);
    spin.textContent = baseLabel;
    $(btnId).disabled = false; spin.style.display = "none";
  }
}

const RULE_SKELETON = `class Strategy(BaseStrategy):
    """5/20 day moving-average crossover (golden/death cross)."""

    fast, slow = 5, 20

    def on_bar(self, bar):
        closes = self.get_history(count=self.slow + 1, symbol=bar.symbol, field="close")
        if len(closes) < self.slow + 1:
            return
        fast_now = closes[-self.fast:].mean()
        slow_now = closes[-self.slow:].mean()
        fast_prev = closes[-self.fast - 1:-1].mean()
        slow_prev = closes[-self.slow - 1:-1].mean()
        position = self.get_position(bar.symbol)
        if fast_prev <= slow_prev and fast_now > slow_now and position <= 0:
            self.order_target_percent(target_percent=0.95, symbol=bar.symbol)
        elif fast_prev >= slow_prev and fast_now < slow_now and position > 0:
            self.close_position(bar.symbol)
`;
const ML_SKELETON = `import numpy as np


class Strategy(BaseStrategy):
    """Toy AR(1) regression on daily returns -> long/flat."""

    lookback = 30

    def on_bar(self, bar):
        closes = self.get_history(count=self.lookback + 1, symbol=bar.symbol, field="close")
        if len(closes) < self.lookback + 1:
            return
        returns = np.diff(closes) / closes[:-1]
        x, y = returns[:-1], returns[1:]
        slope, intercept = np.polyfit(x, y, 1)
        pred = intercept + slope * returns[-1]
        position = self.get_position(bar.symbol)
        if pred > 0 and position <= 0:
            self.order_target_percent(target_percent=0.95, symbol=bar.symbol)
        elif pred <= 0 and position > 0:
            self.close_position(bar.symbol)
`;
const ROTATION_SKELETON = `class Strategy(BaseStrategy):
    """Hold the top-K symbols by FACTOR_SCORES, rebalance every N days."""

    top_k = 5
    rebalance_days = 5
    max_position_pct = 0.95

    def __init__(self):
        super().__init__()
        self.symbols = list(SYMBOLS)
        self.day_count = -1
        self.pending_target = None
        self.held = set()

    def on_daily_rebalance(self, trading_date, timestamp):
        # two-phase rebalance: exit names leaving the portfolio today,
        # enter new names tomorrow -- avoids cash-rejected buy orders.
        if self.pending_target is not None:
            self.order_target_weights(
                target_weights=self.pending_target,
                liquidate_unmentioned=False,
                rebalance_tolerance=0.01,
            )
            self.held = set(self.pending_target)
            self.pending_target = None

        self.day_count += 1
        if self.day_count % self.rebalance_days:
            return
        day_scores = FACTOR_SCORES.get(str(trading_date)[:10]) or {}
        if len(day_scores) < self.top_k:
            return
        ranked = sorted(day_scores, key=day_scores.get, reverse=True)
        weight = self.max_position_pct / self.top_k
        target = {s: weight for s in ranked[: self.top_k]}

        for symbol in self.held - set(target):
            if float(self.get_position(symbol)) > 0:
                self.close_position(symbol)
        self.pending_target = target
`;

/* strategy workbench -> YAML */
// params values are numbers, arrays of expression strings (factor_rotation),
// or multi-line Python source (custom/ML) -- naive `${v}` interpolation
// corrupts all but plain numbers (a bare multi-line string breaks YAML
// structure outright; an array stringifies to a comma join with no
// quoting/brackets), so values need real YAML-safe serialization.
function yamlParamValue(v, contIndent) {
  if (typeof v === "number" || typeof v === "boolean") return String(v);
  if (Array.isArray(v)) {
    return "[" + v.map(x =>
      typeof x === "number" ? x : JSON.stringify(String(x))).join(", ") + "]";
  }
  const s = String(v);
  if (s.includes("\n")) {
    const pad = " ".repeat(contIndent);
    return "|\n" + s.split("\n").map(line => line ? pad + line : "").join("\n");
  }
  return JSON.stringify(s); // double-quoted YAML string syntax
}

  const which = task.kind === "factor" ? "factor" : "strat";

/* ------------------------------------------- indentation-based folding */
// VSCode's default folding (no language server) is indentation-based: a
// line is a fold header when the next non-blank line is more indented
// than it; the fold range runs while indentation stays greater (blank
// lines pass through). This mirrors that for plain-text display of YAML
// and Python alike, with no per-language parsing needed -- EXCEPT PyYAML's
// default block-sequence style, which keeps `- item` list entries at the
// SAME indentation as their parent key (not deeper), e.g.:
//   symbols:
//   - '510300'
//   - '510500'
// so a bare `key:` line followed by a same-indent `- ` line is also
// treated as a fold header, with the range running through the
// contiguous same-indent list items (and any deeper-indented continuation
// lines within them).
function computeFoldRanges(lines) {
  const indentOf = line => line.trim() === "" ? null : line.match(/^ */)[0].length;
  const isListItem = (line, ind) => {
    const rest = line.slice(ind);
    return rest === "-" || rest.startsWith("- ");
  };
  const ranges = {}; // header line index -> exclusive end index
  for (let i = 0; i < lines.length; i++) {
    const ind = indentOf(lines[i]);
    if (ind == null || isListItem(lines[i], ind)) continue;
    let j = i + 1;
    while (j < lines.length && indentOf(lines[j]) == null) j++;
    if (j >= lines.length) continue;
    const nextInd = indentOf(lines[j]);
    const bareKey = lines[i].trim().endsWith(":");
    const deeper = nextInd > ind;
    const sameIndentList = bareKey && nextInd === ind && isListItem(lines[j], nextInd);
    if (!deeper && !sameIndentList) continue;
    let k = j;
    while (k < lines.length) {
      const kind = indentOf(lines[k]);
      if (kind == null) { k++; continue; }
      if (kind > ind || (kind === ind && isListItem(lines[k], kind))) { k++; continue; }
      break;
    }
    ranges[i] = k;
  }
  return ranges;
}

// Renders `text` into `container` as individually foldable lines: a
// small ▸/▾ gutter marker per foldable block, click to collapse/expand.
// Read-only display only -- folding just toggles row visibility, it
// never mutates `text` itself.
function renderFoldableLines(container, text) {
  container.innerHTML = "";
  const lines = (text || "").split("\n");
  const ranges = computeFoldRanges(lines);
  const folded = new Set();
  const rows = [];
  const hints = [];
  function updateVisibility() {
    const hidden = new Array(lines.length).fill(false);
    folded.forEach(h => { for (let i = h + 1; i < ranges[h]; i++) hidden[i] = true; });
    rows.forEach((row, i) => { row.style.display = hidden[i] ? "none" : ""; });
    hints.forEach((hint, i) => { if (hint) hint.style.display = folded.has(i) ? "" : "none"; });
  }
  lines.forEach((line, i) => {
    const row = document.createElement("div");
    row.className = "foldrow";
    const marker = document.createElement("span");
    marker.className = "foldmarker";
    if (ranges[i] != null) {
      marker.classList.add("can-fold");
      marker.textContent = "▾";
      marker.onclick = () => {
        if (folded.has(i)) folded.delete(i); else folded.add(i);
        marker.textContent = folded.has(i) ? "▸" : "▾";
        updateVisibility();
      };
    }
    const content = document.createElement("span");
    content.textContent = line || " ";
    row.appendChild(marker);
    row.appendChild(content);
    if (ranges[i] != null) {
      const hint = document.createElement("span");
      hint.className = "foldhint";
      hint.style.display = "none";
      hint.textContent = ` ⋯ ${ranges[i] - i - 1} lines`;
      row.appendChild(hint);
      hints[i] = hint;
    } else {
      hints[i] = null;
    }
    container.appendChild(row);
    rows.push(row);
  });
}

// the clean Python/expressions the server derived from the parsed spec --

  if (r.kind === "factor") {

    const isFactor = r.kind === "factor";

    renderFoldableLines($("errorTaskYaml"), codeForResult(r));

function renderFactorResult(r) {
  renderFoldableLines($("factorCode"), codeForResult(r));
  const f = r.factor || {};
  const stats = f.stats || [];
  const t = T();
  const hasCaps = stats.some(x => x.constrained_ls_return != null);
  let html = `<tr><th>${t.th_factor}</th><th>${t.th_ic}</th><th>ICIR</th>
    <th>${t.th_pos}</th><th>${t.th_t}</th><th>${t.th_ls}</th>` +
    (hasCaps ? `<th>${t.th_cls}</th><th>${t.th_turn}</th>` : "") +
    `<th>${t.th_n}</th></tr>`;
  stats.forEach(s => {
    const lsCls = s.long_short_total_return == null ? "" :
      (s.long_short_total_return >= 0 ? "pos" : "neg");
    html += `<tr><td>${esc(s.name)}</td><td>${fmtNum(s.ic_mean, 4)}</td>
      <td>${fmtNum(s.icir, 3)}</td><td>${fmtNum(s.ic_positive_rate, 2)}</td>
      <td>${fmtNum(s.ic_t_stat, 2)}</td>
      <td class="${lsCls}">${s.long_short_total_return == null ? "–" :
        (s.long_short_total_return * 100).toFixed(2) + "%"}</td>` +
      (hasCaps ? `<td>${s.constrained_ls_return == null ? "–" :
          (s.constrained_ls_return * 100).toFixed(2) + "%"}</td>
        <td>${fmtNum(s.mean_turnover, 3)}</td>` : "") +
      `<td>${s.n_periods}</td></tr>`;
  });
  $("factorStats").innerHTML = html;
  const names = stats.map(s => s.name);
  if (!names.includes(factorSel)) factorSel = names[0] || null;
  const chips = $("factorChips"); chips.innerHTML = "";
  names.forEach(name => {
    const b = document.createElement("button");
    b.textContent = name;
    b.className = name === factorSel ? "sel" : "";
    b.onclick = () => { factorSel = name; renderFactorResult(r); };
    chips.appendChild(b);
  });
  drawFactorCharts(f);
}
function drawFactorCharts(f) {
  const icBox = $("icWrap"), layerBox = $("layerWrap");
  const ic = (f.ic_series || {})[factorSel];
  if (ic && ic.dates.length) {
    lineChart(icBox, ic.dates,
      [{ name: "IC", color: cssVar("--series-1"), values: ic.ic }],
      { zeroLine: true });
  } else icBox.querySelector(".chartbox").innerHTML = `<div class="muted">–</div>`;
  const lc = (f.layer_curves || {})[factorSel];
  const legend = $("layerLegend"); legend.innerHTML = "";
  if (lc && lc.dates.length) {
    const keys = Object.keys(lc.layers || {});
    const series = keys.map((k, i) => (
      { name: k, color: layerColor(i, keys.length), values: lc.layers[k] }));
    if ((lc.long_short || []).length) {
      series.push({ name: "L-S", color: cssVar("--series-ls"), values: lc.long_short, width: 2.5 });
    }
    if ((lc.long_short_constrained || []).length) {
      const pad = lc.dates.length - lc.long_short_constrained.length;
      const vals = pad > 0
        ? Array(pad).fill(1).concat(lc.long_short_constrained)
        : lc.long_short_constrained;
      series.push({ name: "L-S capped", color: cssVar("--series-2"), values: vals, width: 2 });
    }
    lineChart(layerBox, lc.dates, series, {});
    series.forEach(s => {
      legend.innerHTML += `<span><span class="sw" style="background:${s.color}"></span>${esc(s.name)}</span>`;
    });
  } else layerBox.querySelector(".chartbox").innerHTML = `<div class="muted">–</div>`;
}

/* ------------------------------------ generic multi-series SVG chart */
function lineChart(wrap, dates, series, opts = {}) {
  const box = wrap.querySelector(".chartbox");
  const tip = wrap.querySelector(".tooltip");
  box.innerHTML = ""; tip.style.display = "none";
  const n = dates.length;
  if (!n) { box.innerHTML = `<div class="muted">–</div>`; return; }
  const W = Math.max(box.clientWidth || 680, 320), H = 230;
  const pad = { l: 52, r: 12, t: 10, b: 22 };
  let yMin = Infinity, yMax = -Infinity;
  series.forEach(s => s.values.forEach(v => {
    if (v < yMin) yMin = v; if (v > yMax) yMax = v; }));
  if (opts.zeroLine) { yMin = Math.min(yMin, 0); yMax = Math.max(yMax, 0); }
  const span = (yMax - yMin) || 1;
  const y0 = yMin - span * 0.06, y1 = yMax + span * 0.06;
  const X = i => pad.l + (W - pad.l - pad.r) * (n === 1 ? 0 : i / (n - 1));
  const Y = v => pad.t + (H - pad.t - pad.b) * (1 - (v - y0) / (y1 - y0));
  const yFmt = opts.yFmt || (v => Math.abs(v) >= 1000 ? v.toFixed(0) : v.toFixed(2));
  let grid = "", labels = "";
  for (let g = 0; g <= 3; g++) {
    const val = y0 + (y1 - y0) * g / 3, y = Y(val);
    grid += `<line x1="${pad.l}" y1="${y}" x2="${W - pad.r}" y2="${y}"
      stroke="var(--border)" stroke-width="1"/>`;
    labels += `<text x="${pad.l - 6}" y="${y + 3.5}" text-anchor="end">${yFmt(val)}</text>`;
  }
  if (opts.zeroLine && y0 < 0 && y1 > 0) {
    grid += `<line x1="${pad.l}" y1="${Y(0)}" x2="${W - pad.r}" y2="${Y(0)}"
      stroke="var(--text-muted)" stroke-width="1" stroke-dasharray="2 3"/>`;
  }
  [0, Math.floor((n - 1) / 2), n - 1].forEach(i => {
    const anchor = i === 0 ? "start" : (i === n - 1 ? "end" : "middle");
    labels += `<text x="${X(i)}" y="${H - 5}" text-anchor="${anchor}">${esc(dates[i])}</text>`;
  });
  let polys = "";
  series.forEach(s => {
    const pts = s.values.map((v, i) => `${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(" ");
    polys += `<polyline points="${pts}" fill="none" stroke="${s.color}"
      stroke-width="${s.width || 2}" stroke-linejoin="round"/>`;
  });
  const uid = "c" + Math.random().toString(36).slice(2, 8);
  box.innerHTML = `
  <svg id="${uid}" width="100%" viewBox="0 0 ${W} ${H}" style="display:block">
    ${grid}${labels}${polys}
    <line class="xh" x1="0" y1="${pad.t}" x2="0" y2="${H - pad.b}"
      stroke="var(--text-muted)" stroke-width="1" stroke-dasharray="3 3" opacity="0"/>
  </svg>`;
  const svg = document.getElementById(uid);
  const xh = svg.querySelector(".xh");
  svg.addEventListener("mousemove", ev => {
    const rect = svg.getBoundingClientRect();
    const mx = (ev.clientX - rect.left) * (W / rect.width);
    let i = Math.round((mx - pad.l) / (W - pad.l - pad.r) * (n - 1));
    i = Math.max(0, Math.min(n - 1, i));
    const px = X(i);
    xh.setAttribute("x1", px); xh.setAttribute("x2", px); xh.setAttribute("opacity", "1");
    const rows = series.map(s =>
      `<span class="sw" style="background:${s.color}"></span>` +
      `${esc(s.name)}: <b>${yFmt(s.values[i] == null ? 0 : s.values[i])}</b>`).join("<br>");
    tip.innerHTML = `<span class="t">${esc(dates[i])}</span><br>${rows}`;
    tip.style.display = "block";
    const wrapRect = wrap.getBoundingClientRect();
    let tx = (px / W) * rect.width + 12;
    if (tx + tip.offsetWidth > wrapRect.width - 8) tx -= tip.offsetWidth + 24;
    tip.style.left = tx + "px"; tip.style.top = "10px";
  });
  svg.addEventListener("mouseleave", () => {
    xh.setAttribute("opacity", "0"); tip.style.display = "none";
  });
}

/* --------------------------------------------------------- history */
async function loadHistory() {
  try { historyCache = await api("/api/runs?limit=30"); } catch (e) { return; }
  renderHistory();
}
function marketLabel(source) {
  const mk = marketsCache.find(x => x.source === source);
  if (mk) return lang === "zh" ? mk.label_zh : mk.label_en;
  return source || "–";
}
function renderHistory() {
  const box = $("historyBox");
  if (!box) return;
  const wanted = view === "strategy" ? "strategy" : "factor";
  const rows_data = historyCache.filter(e => (e.kind || "strategy") === wanted);
  if (!rows_data.length) { box.innerHTML = `<div class="muted">${T().no_runs}</div>`; return; }
  const isStrategy = wanted === "strategy";
  const rows = rows_data.map(e => {
    const m = e.metrics || {};
    let perf = "–";
    if (isStrategy) {
      if (m.sharpe_ratio != null) {
        const v = m.sharpe_ratio;
        perf = `<span style="color:${v >= 0 ? "var(--good)" : "var(--serious)"}">${v.toFixed(2)}</span>`;
      }
    } else if (m.ic_mean != null) {
      perf = Number(m.ic_mean).toFixed(4);
    }
    return `<tr class="clickable" data-run="${esc(e.run_id)}">
      <td>${esc((e.logged_at || "").slice(5, 16))}</td>
      <td style="text-align:left">${esc(e.task_name || e.run_id)}</td>
      <td style="text-align:left">${esc(marketLabel(e.data_source))}</td>
      <td style="text-align:left">${esc(e.universe || "–")}</td>
      <td>${perf}</td></tr>`;
  }).join("");
  box.innerHTML = `<div style="overflow-x:auto"><table class="list"><tr>
    <th>${T().col_time}</th><th>${T().col_run}</th><th>${T().col_market}</th>
    <th>${T().col_universe}</th><th>${isStrategy ? T().col_sharpe : T().col_ic}</th></tr>
    ${rows}</table></div>`;
  box.querySelectorAll("tr.clickable").forEach(tr => {
    tr.onclick = () => openRun(tr.dataset.run, true);
  });
}
async function openRun(runId, scroll) {
  const d = await api("/api/runs/" + encodeURIComponent(runId));
  lastResult = {
    ok: true, run_id: d.run_id, kind: d.kind || "strategy",
    metrics: (d.summary || {}).metrics || {},
    num_trades: (d.summary || {}).num_trades,
    factor: d.factor || {},
    risk: d.risk || {},
    strategy_source: d.strategy_source || "",
    factor_expressions: d.factor_expressions || [],
    has_html_report: d.has_html_report,
    validation: d.validation || null,
    task_yaml: d.task_yaml || ""
  };
  if (view !== "strategy" && view !== "factor") {
    view = lastResult.kind === "factor" ? "factor" : "strategy";
    localStorage.setItem("vq_view", view);
    applyChrome();
  } else renderResult(lastResult);
  if (scroll) window.scrollTo({ top: 0, behavior: "smooth" });
}

/* ----------------------------------------------------------- deploy */
async function loadDeployments() {
  try { deploymentsCache = await api("/api/deployments"); } catch (e) { return; }
  const box = $("deployListBox");
  const t = T();
  if (!deploymentsCache.length) {
    box.innerHTML = `<div class="muted">${t.no_items}</div>`; return;
  }
  box.innerHTML = deploymentsCache.map(d => `
    <div class="suggestion" style="cursor:default">
      <div class="t">${esc(d.name)}
        <span class="badge ${d.enabled ? "on" : "off"}">${d.enabled ? t.dep_on : t.dep_off}</span>
        <span class="muted">${esc(d.run_at)} Asia/Shanghai</span></div>
      <div class="m">${esc(d.id)} · email: ${esc(d.email_to || "–")} ·
        last: ${esc(d.last_run_date || "–")}</div>
      <div class="m">${esc(d.last_status || "")}</div>
      <div class="m">${(d.last_signals || []).map(s =>
        `${esc(s.symbol)} <b>${esc(s.action)}</b>`).join(" · ")}</div>
      <div class="row">
        <button data-act="run" data-id="${esc(d.id)}">${t.dep_run}</button>
        <button data-act="toggle" data-id="${esc(d.id)}">${d.enabled ? t.dep_off : t.dep_on}</button>
        <button class="danger" data-act="del" data-id="${esc(d.id)}">${t.dep_del}</button>
      </div>
    </div>`).join("");
  box.querySelectorAll("button[data-act]").forEach(b => {
    b.onclick = async () => {
      b.disabled = true;
      try {
        if (b.dataset.act === "run") {
          const out = await postJson(`/api/deployments/${b.dataset.id}/run`, {});
          $("deploySignalsCard").style.display = "";
          $("deploySignals").textContent = out.report || JSON.stringify(out, null, 2);
        } else if (b.dataset.act === "toggle") {
          await postJson(`/api/deployments/${b.dataset.id}/toggle`, {});
        } else {
          await api(`/api/deployments/${b.dataset.id}`, { method: "DELETE" });
        }
        await loadDeployments();
      } catch (e) { alert(e.message); }
      finally { b.disabled = false; }
    };
  });
}
$("deployCreateBtn").onclick = async () => {
  await withSpin("deployCreateBtn", "deploySpin", "deployError", async () => {
    await postJson("/api/deployments", {
      yaml_text: $("deployYaml").value,
      email_to: $("deployEmail").value.trim(),
      run_at: $("deployTime").value.trim() || "16:30",

    await loadDeployments();

/* ------------------------------------------ foldable YAML DSL editor */
// A single contenteditable region (not a plain <textarea>) so folding
// stays interactive WHILE editing, like a real code editor -- a plain
// textarea can't hide arbitrary lines at all. Each line is a child
// <div class="foldrow"> holding a non-editable fold marker/hint plus an
// editable <span class="linetext"> with the actual text; folding only
// ever toggles a row's `display`, never removing it from the DOM, so the
// full value (below) is always reconstructable regardless of fold state
// -- and reading .value walks every row explicitly by design rather than
// using something like `.innerText` (which skips display:none content
// and would silently drop folded text from what gets submitted/run).
// New content the user types (e.g. pressing Enter to add a line) becomes
// a plain browser-created row with no fold marker of its own -- folding
// is computed once when a task is freshly loaded, not live per keystroke,
// since re-rendering the whole structure on every keystroke would reset
// the cursor position.
(function setupYamlFoldEditor() {
  const el = $("yamlEdit");
  let rows = [];

  function render(text) {
    el.innerHTML = "";
    rows = [];
    const lines = (text || "").split("\n");
    const ranges = computeFoldRanges(lines);
    // default-fold long blocks (e.g. a 24-symbol list) so a freshly
    // loaded task doesn't dump pages of text before you've even looked.
    const folded = new Set(
      Object.keys(ranges).map(Number).filter(h => ranges[h] - h - 1 >= 6)
    );
    const hints = [];
    function updateVisibility() {
      const hidden = new Array(lines.length).fill(false);
      folded.forEach(h => { for (let i = h + 1; i < ranges[h]; i++) hidden[i] = true; });
      rows.forEach((row, i) => { row.style.display = hidden[i] ? "none" : ""; });
      hints.forEach((hint, i) => { if (hint) hint.style.display = folded.has(i) ? "" : "none"; });
    }
    lines.forEach((line, i) => {
      const row = document.createElement("div");
      row.className = "foldrow";
      const marker = document.createElement("span");
      marker.className = "foldmarker";
      marker.contentEditable = "false";
      if (ranges[i] != null) {
        marker.classList.add("can-fold");
        marker.textContent = folded.has(i) ? "▸" : "▾";
        marker.onclick = () => {
          if (folded.has(i)) folded.delete(i); else folded.add(i);
          marker.textContent = folded.has(i) ? "▸" : "▾";
          updateVisibility();
        };
      }
      const content = document.createElement("span");
      content.className = "linetext";
      content.textContent = line;
      row.appendChild(marker);
      row.appendChild(content);
      if (ranges[i] != null) {
        const hint = document.createElement("span");
        hint.className = "foldhint";
        hint.contentEditable = "false";
        hint.style.display = folded.has(i) ? "" : "none";
        hint.textContent = ` ⋯ ${ranges[i] - i - 1} lines`;
        row.appendChild(hint);
        hints[i] = hint;
      } else {
        hints[i] = null;
      }
      el.appendChild(row);
      rows.push(row);
    });
    updateVisibility();
  }

  function getValue() {
    return Array.from(el.children).map(row => {
      const lt = row.querySelector(".linetext");
      return lt ? lt.textContent : row.textContent;
    }).join("\n");
  }

  // force plain-text paste -- rich/HTML paste into a contenteditable
  // region would inject formatting that corrupts the YAML/Python text.
  el.addEventListener("paste", e => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData("text/plain");
    document.execCommand("insertText", false, text);
  });

  Object.defineProperty(el, "value", {
    get: getValue,
    set: v => render(v),
  });
  render("");
})();
