# MA cross on a real ETF — deployable for daily signals:
#   vq deploy add tasks/ma_cross_demo_etf.yaml --email you@example.com
name: ma-cross-510300
kind: strategy
intent: "5/20 MA crossover on 沪深300ETF"
data:
  source: etf
  symbols: [510300]
  start: "2022-01-01"
strategy:
  name: custom
  params:
    warmup: 21
    source: |
      def signal(closes, position):
          if len(closes) < 21:
              return None
          fast = sum(closes[-5:]) / 5
          slow = sum(closes[-20:]) / 20
          fast_prev = sum(closes[-6:-1]) / 5
          slow_prev = sum(closes[-21:-1]) / 20
          if fast_prev <= slow_prev and fast > slow:
              return 1.0  # golden cross -> long
          if fast_prev >= slow_prev and fast < slow:
              return 0.0  # death cross -> flat
          return None
report:
  language: zh
