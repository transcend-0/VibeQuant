# Backtest over local CSV bars (see data/sample/DEMO.csv).
# Run:  vq run tasks/csv_demo.yaml
name: csv-momentum-demo
intent: "20-day momentum on local CSV data"
data:
  source: csv
  path: data/sample
  symbols: [DEMO]
strategy:
  name: custom
  params:
    warmup: 21
    source: |
      def signal(closes, position):
          lookback, threshold = 20, 0.02
          if len(closes) < lookback + 1:
              return None
          ret = closes[-1] / closes[-1 - lookback] - 1.0
          if position <= 0 and ret > threshold:
              return 1.0
          if position > 0 and ret < 0:
              return 0.0
          return None
execution:
  mode: backtest
  initial_cash: 1000000
report:
  language: en
