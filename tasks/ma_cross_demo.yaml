# Dual moving-average crossover on deterministic synthetic data.
# Run:  vq run tasks/ma_cross_demo.yaml
name: ma-cross-demo
intent: "5/20 MA crossover baseline demo on synthetic data"
data:
  source: synthetic
  symbols: [DEMO]
  start: "2022-01-01"
  end: "2024-12-31"
  seed: 42
strategy:
  name: custom
  params:
    warmup: 21
    source: |
      def signal(closes, position):
          if len(closes) < 21:
              return None
          fast = sum(closes[-5:]) / 5
          slow = sum(closes[-20:]) / 20
          fast_prev = sum(closes[-6:-1]) / 5
          slow_prev = sum(closes[-21:-1]) / 20
          if fast_prev <= slow_prev and fast > slow:
              return 1.0  # golden cross -> long
          if fast_prev >= slow_prev and fast < slow:
              return 0.0  # death cross -> flat
          return None
risk:
  max_position_pct: 0.9
  max_drawdown_pct: 25.0
execution:
  mode: backtest
  initial_cash: 1000000
report:
  language: en
