# RSI 超卖反弹策略示例（中文报告）。
# 运行:  vq run tasks/rsi_demo_zh.yaml
name: rsi-超卖反弹示例
intent: "RSI 超卖买入、超买卖出，合成数据演示"
data:
  source: synthetic
  symbols: [DEMO]
  start: "2022-01-01"
  end: "2024-12-31"
  seed: 7
strategy:
  name: custom
  params:
    warmup: 15
    source: |
      def _rsi(closes, period):
          window = closes[-(period + 1):]
          gains = losses = 0.0
          for prev, cur in zip(window, window[1:]):
              delta = cur - prev
              if delta >= 0:
                  gains += delta
              else:
                  losses -= delta
          if losses == 0:
              return 100.0
          rs = (gains / period) / (losses / period)
          return 100.0 - 100.0 / (1.0 + rs)


      def signal(closes, position):
          period, oversold, overbought = 14, 30, 70
          if len(closes) < period + 1:
              return None
          rsi = _rsi(closes, period)
          if position <= 0 and rsi < oversold:
              return 1.0
          if position > 0 and rsi > overbought:
              return 0.0
          return None
execution:
  mode: backtest
  initial_cash: 500000
report:
  language: zh
