# Dual moving-average crossover on deterministic synthetic data.
# Run:  vq run tasks/ma_cross_demo.yaml
name: ma-cross-demo
intent: "5/20 MA crossover baseline demo on synthetic data"
data:
  source: synthetic
  symbols: [DEMO]
  start: "2022-01-01"
  end: "2024-12-31"
  seed: 42
strategy:
  name: ma_cross
  params:
    source: |
      class Strategy(BaseStrategy):
          fast, slow = 5, 20

          def on_bar(self, bar):
              closes = self.get_history(count=self.slow + 1, symbol=bar.symbol, field="close")
              if len(closes) < self.slow + 1:
                  return
              fast_now = closes[-self.fast:].mean()
              slow_now = closes[-self.slow:].mean()
              fast_prev = closes[-self.fast - 1:-1].mean()
              slow_prev = closes[-self.slow - 1:-1].mean()
              position = self.get_position(bar.symbol)
              if fast_prev <= slow_prev and fast_now > slow_now and position <= 0:
                  self.order_target_percent(target_percent=0.9, symbol=bar.symbol)
              elif fast_prev >= slow_prev and fast_now < slow_now and position > 0:
                  self.close_position(bar.symbol)
risk:
  max_position_pct: 0.9
  max_drawdown_pct: 25.0
execution:
  mode: backtest
  initial_cash: 1000000
report:
  language: en
