# Backtest over local CSV bars (see data/sample/DEMO.csv).
# Run:  vq run tasks/csv_demo.yaml
name: csv-momentum-demo
intent: "20-day momentum on local CSV data"
data:
  source: csv
  path: data/sample
  symbols: [DEMO]
strategy:
  name: momentum
  params:
    source: |
      class Strategy(BaseStrategy):
          lookback, threshold = 20, 0.02

          def on_bar(self, bar):
              closes = self.get_history(count=self.lookback + 1, symbol=bar.symbol, field="close")
              if len(closes) < self.lookback + 1:
                  return
              ret = closes[-1] / closes[0] - 1.0
              position = self.get_position(bar.symbol)
              if position <= 0 and ret > self.threshold:
                  self.order_target_percent(target_percent=0.95, symbol=bar.symbol)
              elif position > 0 and ret < 0:
                  self.close_position(bar.symbol)
execution:
  mode: backtest
  initial_cash: 1000000
report:
  language: en
